# Example mcp-dispatch config. Copy to ~/.config/mcp-dispatch/config.toml
# (or point MCP_DISPATCH_CONFIG at it) and edit to taste.

# Agent roster. Omit (or leave empty) for dynamic mode, where any validated
# agent id is accepted and inboxes are created on demand. With the launcher
# (bin/dispatch-launcher) deriving "<project>-<pid>" ids, dynamic mode is the
# usual choice.
# agents = ["alice", "bob", "carol"]

# Where messages live. Per-user, created 0700; messages are 0600.
dispatch_dir = "~/.config/mcp-dispatch/messages"

# Share one relay across mutually-trusting accounts in a common OS group
# (e.g. several accounts belonging to one person). When true, the relay dir and
# message files become group-rw (2770 / 0660) instead of owner-only, and the
# server tolerates a relay it doesn't own. Requirements:
#   - point dispatch_dir at a shared path outside any single home dir
#   - that dir must be group-owned by the shared group and setgid:
#       mkdir -p <dir> && chgrp <group> <dir> && chmod 2770 <dir>
#   - every participating account must be a member of <group>
# Leave false (the default) for the normal single-user case.
# group_mode = true
# dispatch_dir = "/var/tmp/mcp-dispatch"

# Max message size in bytes.
max_message_bytes = 65536

# Adopt unread mail left behind by a dead session of the same project. Dynamic-mode
# ids are <project>-<pid>, so a restart is a NEW id with an empty inbox — without
# this, anything the old session never read rots unread in a directory nobody
# opens again, while the sender's receipt still shows it queued. Only inherits
# from a same-project id whose presence lock is gone and whose inbox belongs to
# the same account. Default true; no effect in roster mode.
# inherit_inbox = false

# Default TTL in seconds. 0 = no expiry. must_read messages ignore it.
# A week, so messages survive long-idle/parked sessions instead of expiring
# unread. Time-sensitive sends should set a short ttl= explicitly.
default_ttl = 604800  # 7 days

# Parked-session alerts. A session that's idle (model taking no turns) gets
# nothing from piggyback or the Stop hook — but the server process is still
# alive, so it can shell out to a notifier when a message arrives. No Python
# deps; it just runs this command with (summary, body) appended as two args.
# On GNOME, notify-send is already present:
#   notify_command = "notify-send -a dispatch"
# notify_command = "notify-send -a dispatch"
#
# notify_on selects which messages count. must_read always pierces (except "none"):
#   "none"      — never
#   "direct"    — addressed to this agent: a DM (to == my id) OR a post to a
#                 channel I subscribe to (subscribing is the opt-in). Broadcast
#                 ("all") stays out — nobody opted into it.
#   "important" — urgent priority (this default also fires on must_read)
#   "all"       — everything
# notify_on = "important"
#
# The SAME notify_on also drives bin/dispatch-wait, the model-wake watch that
# replaces /loop for parked sessions: run `dispatch-wait --follow` under the
# Monitor tool and the harness re-invokes the model on every qualifying message
# (zero tokens while idle). For "wake me only on messages addressed to me", set:
#   notify_on = "direct"
#
# auto_arm (default true): when hooks/dispatch-arm.py is wired into SessionStart
# and Stop, the session starts one persistent `dispatch-wait --follow` watch at
# startup with no human in the loop (the hook nudges the model — only the model
# can start the wake source). Because the watch is persistent it's armed once per
# session, not once per message. Set false to disable, or export
# MCP_DISPATCH_NO_AUTO_ARM=1.
# auto_arm = false
#
# Cross-account note: notify-send needs the target user's desktop session bus.
# If a second account has no graphical session, point notify_command at a small
# wrapper that sets DBUS_SESSION_BUS_ADDRESS / DISPLAY, or one that pushes
# elsewhere (e.g. ntfy, or appending to a log you tail).

# -- Cross-host comms (git transport) -----------------------------------------
# Bridge this host's local bus to other machines through a shared git repo. Off
# by default — with it off, dispatch is purely local, exactly as before. Run the
# bin/dispatch-gitsync daemon once per host; it mirrors the local DISPATCH_DIR
# <-> a git clone, so agents reach agents on OTHER hosts with zero change to how
# they call dispatch(). A message from another machine is materialized as a normal
# inbox file, so it wakes a parked session through the usual path. The git wire
# format is the cross-language contract (see docs/git-transport.md); the canonical
# Go impl is `leat`.
[git]
# enabled = true
#
# A working clone of a (private) git repo shared across your hosts. Make the repo
# once, clone it on each host, and point repo_dir at the clone:
#   git clone git@github.com:you/agent-bus.git ~/.config/mcp-dispatch/bus
# repo_dir = "~/.config/mcp-dispatch/bus"
#
# Git remote within that clone to fetch/push. Omit for a local-only bus (tests,
# single host with multiple DISPATCH_DIRs).
# remote = "origin"
#
# Seconds between sync passes.
# interval = 2.0
#
# Ceiling for the INBOUND fetch cadence when the bus is quiet (default 30s; set 0
# to fetch every pass). `git fetch` costs ~170ms of CPU against a real remote while
# the entire local scan costs ~12ms, so a daemon supervised 24/7 would otherwise
# spend all its CPU asking a silent remote whether anything happened. Outbound is
# unaffected — sends always go at `interval` — and any traffic in either direction
# snaps the fetch cadence straight back to `interval`. The only cost is that the
# first message arriving after a long lull can take up to this long to be noticed.
# max_fetch_interval = 30.0
#
# Exit once no agent on this host holds a presence lock (default true). That gate
# is what stops a hook-spawned daemon from orphaning — but presence is claimed by
# the mcp-dispatch MCP *server*, so an agent on another harness (openclaw, Hermes,
# a plain script, cron) never claims it and the daemon self-terminates after ~60s,
# leaving both sides talking to a wall. Set false when the daemon is supervised by
# something that owns its lifetime — which is what `dispatch-gitsync service
# install` (a systemd user unit) sets up, passing --no-presence-gate explicitly.
# presence_gate = false
#
# What to mirror:
#   "remote-only" (default) — only bridge a message with no live-local recipient;
#                             same-host chatter stays local and private.
#   "all"                   — mirror every DM too: a full audited cross-host replica.
# mirror = "remote-only"

# Affordance contract — the load-bearing "when to reach for this" guidance the
# model reads at session start. The built-in default is a good generic version;
# override here for environment-specific escalation paths. Placeholders:
# {agent_id}, {agent_list}.
#
# This example wires the loose escalation seam to a structured-deliberation tool
# via the generic payload field (no coupling in the dispatch code itself):
instructions = """
You are agent '{agent_id}' on MCP Dispatch, a messaging rail shared with other \
agent sessions running concurrently on this host (siblings in nearby project \
directories). When your work would ripple into a sibling's work — a shared- \
interface change, a decision affecting a dependent repo, or a learning a sibling \
needs — dispatch a short FYI to the relevant agent or '#channel'. Most exchanges \
are 1-3 messages. If a genuine weighed decision emerges, escalate: open a gemot \
deliberation and dispatch its join code as a structured payload, e.g. \
payload={{"type": "gemot.invite", "deliberation_id": "...", "join_code": "..."}}. \
Tools: dispatch(message, target), peek(), ack(ids), who(), \
subscribe('#name')/unsubscribe('#name'). Incoming messages also piggyback on \
every tool response — address them before resuming your current task. \
Available targets: {agent_list}.
"""
